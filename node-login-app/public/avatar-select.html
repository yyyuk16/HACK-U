<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アバター選択</title>
    <style>
        :root {
            --bg: #f3e9dc;
            --surface: #fff;
            --line: #2f3a4a;
            --blue: #8ecdf0;
            --pink: #f4a6a6;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            font-family: "Zen Maru Gothic", Arial, sans-serif;
            color: #1f2937;
            padding: 24px;
        }
        .container {
            width: min(960px, 96vw);
            background: var(--surface);
            border: 4px solid var(--line);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 6px 6px 0 0 var(--line);
        }
        .logo {
            display: block;
            width: min(340px, 92%);
            margin: 0 auto 10px;
            image-rendering: pixelated;
        }
        h1 {
            margin: 0;
            text-align: center;
            color: var(--line);
            font-family: "DotGothic16", monospace;
            font-size: 32px;
            border-bottom: 4px solid var(--line);
            padding-bottom: 8px;
        }
        .description {
            text-align: center;
            color: #556;
            margin: 10px 0 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }
        .card {
            border: 3px solid var(--line);
            border-radius: 12px;
            background: #fffdf7;
            padding: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0 0 var(--line);
            transition: transform .08s ease, box-shadow .08s ease;
        }
        .card:hover {
            background: #fdf2f5;
        }
        .card:active {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0 0 var(--line);
        }
        .sprite-frame {
            width: 32px;
            height: 32px;
            background: transparent;
            display: block;
            margin: 0 auto;
        }
        .sprite-frame img {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
            display: block;
        }
        .name {
            margin-top: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--line);
        }
    </style>
</head>
<body>
    <main class="container">
        <img class="logo" src="/logo.png" alt="あつまち ロゴ">
        <h1>アバターを選択してください</h1>
        <p class="description">この選択が今後の仮想空間での見た目になります。</p>
        <form id="avatarForm" action="/avatar/select" method="POST">
            <input type="hidden" name="avatarKey" id="avatarKey">
            <div class="grid">
                <button class="card" type="button" data-avatar="avatar-01">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-01-front.png" alt="アバター1 正面"></span>
                    <div class="name">アバター1</div>
                </button>
                <button class="card" type="button" data-avatar="avatar-02">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-02-front.png" alt="アバター2 正面"></span>
                    <div class="name">アバター2</div>
                </button>
                <button class="card" type="button" data-avatar="avatar-03">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-03-front.png" alt="アバター3 正面"></span>
                    <div class="name">アバター3</div>
                </button>
                <button class="card" type="button" data-avatar="avatar-04">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-04-front.png" alt="アバター4 正面"></span>
                    <div class="name">アバター4</div>
                </button>
                <button class="card" type="button" data-avatar="avatar-05">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-05-front.png" alt="アバター5 正面"></span>
                    <div class="name">アバター5</div>
                </button>
                <button class="card" type="button" data-avatar="avatar-06">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-06-front.png" alt="アバター6 正面"></span>
                    <div class="name">アバター6</div>
                </button>
                <button class="card" type="button" data-avatar="avatar-07">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-07-front.png" alt="アバター7 正面"></span>
                    <div class="name">アバター7</div>
                </button>
                <button class="card" type="button" data-avatar="avatar-08">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-08-front.png" alt="アバター8 正面"></span>
                    <div class="name">アバター8</div>
                </button>
                <button class="card" type="button" data-avatar="avatar-09">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-09-front.png" alt="アバター9 正面"></span>
                    <div class="name">アバター9</div>
                </button>
                <button class="card" type="button" data-avatar="avatar-10">
                    <span class="sprite-frame"><img src="/avatars/front/avatar-10-front.png" alt="アバター10 正面"></span>
                    <div class="name">アバター10</div>
                </button>
            </div>
        </form>
    </main>
    <script>
        const form = document.getElementById('avatarForm');
        const avatarInput = document.getElementById('avatarKey');
        document.querySelectorAll('[data-avatar]').forEach((button) => {
            button.addEventListener('click', () => {
                avatarInput.value = button.dataset.avatar;
                form.submit();
            });
        });
    </script>
</body>
</html>
