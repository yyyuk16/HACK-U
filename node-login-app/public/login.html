<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
</head>
<body>
    <h2>ログイン</h2>
    <form action="/login" method="POST">
        <div>
            <label>ユーザー名:</label>
            <input type="text" name="username" required>
        </div>
        <div>
            <label>パスワード:</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">ログイン</button>
    </form>
    <a href="/register.html">新規登録はこちら</a>
</body>
</html>
