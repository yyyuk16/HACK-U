<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <style>
        :root {
            --bg: #f3e9dc;
            --surface: #ffffff;
            --line: #2f3a4a;
            --blue: #8ecdf0;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            font-family: "Zen Maru Gothic", Arial, sans-serif;
            color: #1f2937;
            padding: 24px;
        }
        .container {
            width: min(460px, 94vw);
            background: var(--surface);
            border: 4px solid var(--line);
            border-radius: 16px;
            box-shadow: 6px 6px 0 0 var(--line);
            padding: 20px;
        }
        .logo {
            display: block;
            width: min(360px, 92%);
            margin: 0 auto 12px;
            image-rendering: pixelated;
        }
        h2 {
            margin: 0 0 14px;
            font-size: 32px;
            color: var(--line);
            text-align: center;
            font-family: "DotGothic16", monospace;
            border-bottom: 4px solid var(--line);
            padding-bottom: 8px;
        }
        form {
            display: grid;
            gap: 10px;
        }
        label {
            font-weight: 700;
            color: var(--line);
            font-family: "DotGothic16", monospace;
            display: block;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 3px solid var(--line);
            border-radius: 10px;
            box-shadow: inset 3px 3px 0 0 rgba(47, 58, 74, 0.12);
            font-size: 14px;
        }
        button {
            margin-top: 4px;
            border: 3px solid var(--line);
            border-radius: 10px;
            background: var(--blue);
            color: var(--line);
            font-weight: 700;
            padding: 10px 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0 0 var(--line);
        }
        button:active {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0 0 var(--line);
        }
        .register-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--line);
            text-decoration: none;
            border-bottom: 2px solid var(--line);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="container">
        <img class="logo" src="/logo.png" alt="あつまち ロゴ">
        <form action="/login" method="POST">
            <div>
                <label>ユーザー名</label>
                <input type="text" name="username" required>
            </div>
            <div>
                <label>パスワード</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">ログイン</button>
        </form>
        <div style="text-align: center;">
            <a class="register-link" href="/register.html">新規登録はこちら</a>
        </div>

    </main>
</body>
</html>
