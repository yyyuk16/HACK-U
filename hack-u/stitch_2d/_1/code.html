<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden">

<div class="flex items-center space-x-md">

<span class="material-symbols-outlined mr-sm" data-icon="settings">settings</span> Settings

                                Select Region

<option disabled="" selected="" value="">Choose an area...</option>
<option value="kanto">Kanto (Tokyo, Yokohama)</option>
<option value="kansai">Kansai (Kyoto, Osaka)</option>
<option value="hokkaido">Hokkaido</option>
<option value="kyushu">Kyushu</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-md text-[#2F3A4A]">
<span class="material-symbols-outlined" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>

</div>

<span class="font-body-md text-body-md text-[#2F3A4A]">Chill</span>

<span class="font-body-md text-body-md text-[#2F3A4A]">Active</span>
</label>
</div>

<span class="material-symbols-outlined text-3xl group-hover:animate-spin" data-icon="flight_takeoff" data-weight="fill">flight_takeoff</span>

                </button>

</div>

<a class="flex flex-col items-center justify-center bg-[#8ECDF0] text-[#2F3A4A] border-2 border-[#2F3A4A] rounded-none p-2 shadow-[2px_2px_0_0_rgba(47,58,74,1)] active:scale-95 transition-transform w-24" href="#">
<span class="material-symbols-outlined" data-icon="near_me">near_me</span>
<span class="font-mono font-bold text-[10px] uppercase mt-1">Nearby</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2F3A4A] opacity-70 p-2 hover:bg-stone-200 active:scale-95 transition-transform w-24" href="#">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
<span class="font-mono font-bold text-[10px] uppercase mt-1">Talk</span>
</a>
