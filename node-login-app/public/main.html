<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メイン画面</title>
    <style>
        :root {
            --bg: #f3e9dc;
            --surface: #ffffff;
            --line: #2f3a4a;
            --blue: #8ecdf0;
            --pink: #f4a6a6;
            --green: #9ed8b5;
            --text: #1f2937;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Zen Maru Gothic", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .container {
            width: min(860px, 96vw);
            background: var(--surface);
            border: 4px solid var(--line);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 6px 6px 0 0 var(--line);
        }
        .logo {
            display: block;
            width: min(460px, 98%);
            margin: 0 auto 2px;
            image-rendering: pixelated;
        }
        .nickname {
            margin: 0 0 16px;
            font-size: 34px;
            font-family: "DotGothic16", monospace;
            color: var(--line);
            text-align: center;
            border-bottom: 4px solid var(--line);
            padding-bottom: 10px;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .actions button {
            min-width: 0;
            padding: 14px 12px;
            border: 3px solid var(--line);
            box-shadow: 4px 4px 0 0 var(--line);
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            color: var(--line);
            background: #fff;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
        }
        .actions button:active {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0 0 var(--line);
        }
        .talk { background: var(--blue); }
        .meet { background: var(--green); }
        .mypage { background: var(--pink); }
        .panels {
            margin-top: 18px;
            display: grid;
            gap: 12px;
            text-align: left;
        }
        .panel {
            border: 3px solid var(--line);
            border-radius: 12px;
            background: #fffdf7;
            box-shadow: 4px 4px 0 0 var(--line);
            overflow: hidden;
        }
        .panel h2 {
            margin: 0;
            font-size: 16px;
            font-family: "DotGothic16", monospace;
            color: var(--line);
            padding: 10px 12px;
            border-bottom: 3px solid var(--line);
            background: #f9eef2;
        }
        .panel > div {
            padding: 10px 12px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-top: 1px dashed #a8b3c2;
        }
        .item:first-of-type { border-top: none; }
        .item-actions { display: flex; gap: 6px; }
        .item-actions button {
            border: 2px solid var(--line);
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            color: var(--line);
            background: #fff;
        }
        .accept { background: #a8ecc4; }
        .reject { background: #f8dde3; }
        .empty { color: #667; font-size: 13px; margin: 0; }
        .status-online { color: #0f766e; font-weight: 700; }
        .status-offline { color: #64748b; }
    </style>
</head>
<body>
    <main class="container">
        <img class="logo" src="/logo.png" alt="あつまち ロゴ">
        <h1 class="nickname" id="nickname">読み込み中...</h1>
        <div class="actions">
            <button class="talk" id="talkButton" type="button">話す</button>
            <button class="meet" id="meetButton" type="button">会う</button>
            <button class="mypage" id="mypageButton" type="button">マイページ</button>
        </div>
        <section class="panels">
            <article class="panel">
                <h2>フレンド申請</h2>
                <div id="incomingRequests">
                    <p class="empty">読み込み中...</p>
                </div>
            </article>
            <article class="panel">
                <h2>フレンド一覧</h2>
                <div id="friendList">
                    <p class="empty">読み込み中...</p>
                </div>
            </article>
        </section>
    </main>
    <script>
        const ONLINE_WINDOW_SECONDS = 300;

        function formatLastSeen(lastSeenAt) {
            if (!lastSeenAt) {
                return { label: 'オフライン（記録なし）', online: false };
            }
            const date = new Date(lastSeenAt);
            if (Number.isNaN(date.getTime())) {
                return { label: 'オフライン（時刻不明）', online: false };
            }
            const diffSeconds = Math.floor((Date.now() - date.getTime()) / 1000);
            if (diffSeconds <= ONLINE_WINDOW_SECONDS) {
                return { label: 'オンライン', online: true };
            }
            const minutes = Math.max(1, Math.floor(diffSeconds / 60));
            if (minutes < 60) {
                return { label: `${minutes}分前に接続`, online: false };
            }
            const hours = Math.floor(minutes / 60);
            if (hours < 24) {
                return { label: `${hours}時間前に接続`, online: false };
            }
            const days = Math.floor(hours / 24);
            return { label: `${days}日前に接続`, online: false };
        }

        async function loadIncomingRequests() {
            const root = document.getElementById('incomingRequests');
            try {
                const response = await fetch('/friend-requests/incoming');
                if (!response.ok) {
                    root.innerHTML = '<p class="empty">申請一覧を取得できませんでした。</p>';
                    return;
                }
                const data = await response.json();
                const requests = data.requests || [];
                if (requests.length === 0) {
                    root.innerHTML = '<p class="empty">新しい申請はありません。</p>';
                    return;
                }
                root.innerHTML = requests.map((request) => `
                    <div class="item">
                        <span>${request.requester_nickname} さん</span>
                        <div class="item-actions">
                            <button class="accept" data-request-id="${request.id}" data-accept="true">承認</button>
                            <button class="reject" data-request-id="${request.id}" data-accept="false">拒否</button>
                        </div>
                    </div>
                `).join('');
                root.querySelectorAll('button[data-request-id]').forEach((button) => {
                    button.addEventListener('click', async () => {
                        const requestId = button.getAttribute('data-request-id');
                        const accept = button.getAttribute('data-accept') === 'true';
                        await fetch(`/friend-requests/${requestId}/respond`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ accept })
                        });
                        await Promise.all([loadIncomingRequests(), loadFriends()]);
                    });
                });
            } catch (error) {
                root.innerHTML = '<p class="empty">申請一覧を取得できませんでした。</p>';
            }
        }

        async function loadFriends() {
            const root = document.getElementById('friendList');
            try {
                const response = await fetch('/friends');
                if (!response.ok) {
                    root.innerHTML = '<p class="empty">フレンド一覧を取得できませんでした。</p>';
                    return;
                }
                const data = await response.json();
                const friends = data.friends || [];
                if (friends.length === 0) {
                    root.innerHTML = '<p class="empty">フレンドはまだいません。</p>';
                    return;
                }
                root.innerHTML = friends.map((friend) => {
                    const status = formatLastSeen(friend.last_seen_at);
                    const profile = `${friend.occupation || ''}${friend.prefecture ? ' / ' + friend.prefecture : ''}`;
                    return `
                        <div class="item">
                            <div>
                                <div>${friend.nickname}</div>
                                <small class="${status.online ? 'status-online' : 'status-offline'}">${status.label}</small>
                            </div>
                            <small>${profile}</small>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                root.innerHTML = '<p class="empty">フレンド一覧を取得できませんでした。</p>';
            }
        }

        async function loadUser() {
            try {
                const response = await fetch('/me');
                if (!response.ok) {
                    location.href = '/login.html';
                    return;
                }
                const user = await response.json();
                document.getElementById('nickname').textContent = `${user.nickname} さん`;
            } catch (error) {
                location.href = '/login.html';
            }
        }
        document.getElementById('talkButton').addEventListener('click', () => {
            location.href = '/selecttalk.html';
        });
        document.getElementById('meetButton').addEventListener('click', () => {
            location.href = '/selectmeet.html';
        });
        document.getElementById('mypageButton').addEventListener('click', () => {
            location.href = '/mypage.html';
        });
        async function boot() {
            await loadUser();
            await Promise.all([loadIncomingRequests(), loadFriends()]);
            setInterval(() => {
                void loadIncomingRequests();
            }, 10000);
        }
        boot();
    </script>
</body>
</html>
