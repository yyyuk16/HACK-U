<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Pixel Art Activity Board</title>
    <style>
        body {
            background-color: #6a4c42;
            /* ご指定の茶色 */
            margin: 0;
            padding: 30px;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            color: #f1e4d0;
        }

        .controls {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        input[type="text"] {
            padding: 12px;
            border-radius: 6px;
            border: 2px solid #be9a78;
            background: #f1e4d0;
            width: 250px;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            background-color: #be9a78;
            border: none;
            border-radius: 6px;
            color: #3e2b26;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #d8c3b1;
        }

        #gallery-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .attribute-row {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            background-color: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            /* 横に増えたらスクロール */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .attribute-label {
            min-width: 140px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffca85;
            padding-top: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* --- 既存のスタイルを修正 --- */

        .room-list {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            /* 画像の高さを下揃えに */
        }

        /* 画像とラベルをセットにする枠 */
        .room-wrapper {
            display: flex;
            flex-direction: column;
            /* 縦に並べる */
            align-items: center;
            /* 中央寄せ */
            gap: 8px;
            /* 画像と上部情報の間の隙間 */
        }

        /* 左側の大きなラベルは不要なので非表示にする */
        .attribute-label {
            display: none;
            /* ← ここを追加（または削除） */
        }

        /* --- 新しく追加するスタイル --- */

        /* 画像自体のスタイル（以前と同じ） */
        .room-item {
            width: 320px;
            height: auto;
            border: 5px solid #000;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
            image-rendering: pixelated;
        }

        /* 画像の上の情報枠（アイコン+文字） */
        .room-top-info {
            display: flex;
            align-items: center;
            /* 縦方向中央寄せ */
            gap: 6px;
            /* アイコンと文字の間の隙間 */
        }

        /* アイコン（ピクトグラム）のスタイル */
        .room-icon {
            font-size: 1.4rem;
            /* 少し大きく */
        }

        /* 画像の上の文字スタイル */
        .room-label-top {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f1e4d0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* モーダル背景 */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* モーダル本体 */
        #room-modal {
            background: #f1e4d0;
            color: #3e2b26;
            padding: 30px;
            border-radius: 12px;
            border: 6px solid #be9a78;
            position: relative;
            text-align: center;
            min-width: 300px;
        }

        /* ×ボタン */
        #modal-close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            background: none;
            border: none;
            font-size: 24px;
            color: #3e2b26;
            cursor: pointer;
        }

        /* 入室ボタン */
        #join-btn {
            margin-top: 15px;
            width: 100%;
            background-color: #6a4c42;
            color: white;
        }

        /* 画像にマウスを乗せた時の設定 */
        .room-item {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .room-item:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* ホバー時にツールチップ（簡易補足）を出すための設定 */
        .room-wrapper {
            position: relative;
        }

        .room-wrapper:hover::after {
            content: "ジャンル：" attr(data-genre) "\A 内容：ここに補足を表示";
            white-space: pre;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="controls">
        <input type="text" id="attr-input" placeholder="属性名（例：食事）を入力">
        <button id="add-btn">同じ属性の部屋を追加</button>
    </div>

    <div id="gallery-container">
        <!-- JavaScriptによってデフォルト画像がここに生成されます -->
    </div>

    <div id="modal-overlay" style="display: none;">
        <div id="room-modal">
            <button id="modal-close-btn">×</button>
            <h2 id="modal-title">ジャンル：食事</h2>
            <p id="modal-desc">内容：「ここに補足を表示」</p>
            <button id="join-btn">入室ボタン</button>
        </div>
    </div>

    <script>
        // デフォルト画像の定義（属性名とファイル名の対応）
        // 1. デフォルト画像の定義（アイコンを追加）
        const defaultSettings = [
            { id: 'フリー', src: './buildingimgs/free.png', icon: '🆓' }, // 例：フリー
            { id: '食事', src: './buildingimgs/meal.png', icon: '🍽️' },   // 例：食事
            { id: '飲み', src: './buildingimgs/sake.png', icon: '🍶' },   // 例：飲み
            { id: '勉強', src: './buildingimgs/study.png', icon: '📚' },   // 例：勉強
            { id: 'ゲーム', src: './buildingimgs/game.png', icon: '🎮' },   // 例：ゲーム
            { id: '応援', src: './buildingimgs/cheer.png', icon: '📣' },   // 例：応援
            { id: 'ディスカッション', src: './buildingimgs/discuss.png', icon: '🗣️' } // 例：議論
        ];

        const container = document.getElementById('gallery-container');
        const input = document.getElementById('attr-input');
        const btn = document.getElementById('add-btn');

        // 各属性の行要素を保持するオブジェクト
        const rows = {};

        // 1. 初期表示（7枚を縦に並べる）
        function initialize() {
            defaultSettings.forEach(item => {
                createRow(item.id);
                addRoomImage(item.id, item.src);
            });
        }

        // 行を作成する関数
        function createRow(id) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'attribute-row';

            const label = document.createElement('div');
            label.className = 'attribute-label';
            label.textContent = id;

            const roomList = document.createElement('div');
            roomList.className = 'room-list';

            rowDiv.appendChild(label);
            rowDiv.appendChild(roomList);
            container.appendChild(rowDiv);

            rows[id] = rowDiv;
        }

        // 2. 画像を追加する関数を修正
        function addRoomImage(id, src) {
            const roomList = rows[id].querySelector('.room-list');

            // 画像と上部情報をセットにする枠
            const wrapper = document.createElement('div');
            wrapper.className = 'room-wrapper';

            // 上部情報（アイコン + 文字）
            const topInfo = document.createElement('div');
            topInfo.className = 'room-top-info';

            // アイコン（ピクトグラム）
            const setting = defaultSettings.find(s => s.id === id); // 設定を取得
            const iconSpan = document.createElement('span');
            iconSpan.className = 'room-icon';
            iconSpan.textContent = setting ? setting.icon : '❓'; // 見つからない時は「？」

            // 属性名
            const labelSpan = document.createElement('span');
            labelSpan.className = 'room-label-top';
            labelSpan.textContent = id;

            // 画像
            const img = document.createElement('img');
            img.src = src;
            img.className = 'room-item';

            // 組み立て
            topInfo.appendChild(iconSpan); // アイコン
            topInfo.appendChild(labelSpan); // 文字

            wrapper.appendChild(topInfo); // 上部
            wrapper.appendChild(img);     // 下部

            roomList.appendChild(wrapper);
        }

        const modal = document.getElementById('modal-overlay');
        const closeBtn = document.getElementById('modal-close-btn');

        // モーダルを閉じる処理
        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

        function addRoomImage(id, src) {
            const roomList = rows[id].querySelector('.room-list');

            const wrapper = document.createElement('div');
            wrapper.className = 'room-wrapper';
            wrapper.setAttribute('data-genre', id); // ホバー時のテキスト用

            const img = document.createElement('img');
            img.src = src;
            img.className = 'room-item';

            // --- ここからクリック処理の追加 ---
            img.onclick = () => {
                document.getElementById('modal-title').textContent = `ジャンル：${id}`;
                document.getElementById('modal-desc').textContent = `内容：「ここに補足を表示」`;
                modal.style.display = 'flex';
            };
            // --- ここまで ---

            wrapper.appendChild(img);
            roomList.appendChild(wrapper);
        }
        // ボタンクリック時の挙動（既存の属性なら横に追加）
        btn.addEventListener('click', () => {
            const val = input.value.trim();
            if (!val) return;

            if (rows[val]) {
                // 既存の属性が見つかった場合、その属性のデフォルト画像（src）を取得して追加
                const setting = defaultSettings.find(s => s.id === val);
                const imagePath = setting ? setting.src : defaultSettings[0].src;
                addRoomImage(val, imagePath);
                input.value = "";
            } else {
                alert("指定された属性（" + val + "）の行が見つかりません。");
            }
        });

        // 実行
        initialize();
    </script>
</body>

</html>
